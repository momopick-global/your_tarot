# GitHub Pages에 정적 사이트(out/) 배포
# 저장소 Settings → Pages → Build: GitHub Actions 로 설정 필요
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

# deploy 잡은 반드시 job 단위로 pages + id-token (OIDC) 권한 필요
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # upload-pages-artifact
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: GitHub Pages용 basePath (/저장소이름)
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          echo "NEXT_PUBLIC_BASE_PATH=/${REPO}" >> "$GITHUB_ENV"
          echo "basePath will be /${REPO}"

      - run: npm ci
      - run: npm run build
      - name: Exclude non-deploy assets
        run: rm -rf out/images/xxx

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
